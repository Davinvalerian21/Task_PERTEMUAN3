<!DOCTYPE html>
<html>
<head>
    <title>Employee Details</title>
    <style>
        body { font-family: sans-serif; }
        table { max-width: 600px; margin: auto; }
        td { padding: 8px; }
        input[type="text"], input[type="date"], input[type="tel"], input[type="email"], select, textarea {
            width: 100%;
            padding: 8px;
            box-sizing: border-box;
            border: 1px solid #ccc;
            border-radius: 4px;
        }
        .section-title {
            color: #3b5998;
            font-weight: bold;
            border-bottom: 2px solid #3b5998;
            padding-bottom: 5px;
            margin-top: 15px;
        }
        label { font-size: 14px; }
        .required { color: red; }
        .btn-register {
            background-color: #3b5998;
            color: white;
            padding: 10px 30px;
            border: none;
            border-radius: 5px;
            font-size: 16px;
            cursor: pointer;
        }
    </style>
</head>
<body>

<h2 style="text-align: center;">Employee Details</h2>

<form>
    <table border="0" width="100%">
        <tr>
            <td colspan="2">
                <div class="section-title">01. Personal Information</div>
            </td>
        </tr>
        <tr>
            <td width="50%">
                <label>Employee Name <span class="required">*</span></label><br>
                <input type="text" name="firstname" placeholder="First Name">
            </td>
            <td width="50%">
                <label>Last Name</label><br>
                <input type="text" name="lastname" placeholder="Last Name">
            </td>
        </tr>
        <tr>
            <td>
                <label>Starting Date</label><br>
                <input type="date" name="startdate">
            </td>
            <td>
                <label>Birth Date</label><br>
                <input type="date" name="birthdate">
            </td>
        </tr>
        <tr>
            <td>
                <label>Employee Type</label><br>
                <select name="emptype">
                    <option value="" disabled selected>Select</option>
                    <option value="full">Full-Time</option>
                    <option value="part">Part-Time</option>
                </select>
            </td>
            <td>
                <label>Gender</label><br>
                <input type="radio" id="male" name="gender" value="Male">
                <label for="male">Male</label>
                &nbsp;&nbsp;
                <input type="radio" id="female" name="gender" value="Female">
                <label for="female">Female</label>
            </td>
        </tr>
        <tr>
            <td>
                <label>Position</label><br>
                <input type="text" name="position" placeholder="Position">
            </td>
            <td></td>
        </tr>

        <tr>
            <td colspan="2">
                <div class="section-title">02. Location</div>
            </td>
        </tr>
        <tr>
            <td>
                <label>City</label><br>
                <input type="text" name="city" placeholder="City">
            </td>
            <td>
                <label>State</label><br>
                <input type="text" name="state" placeholder="State">
            </td>
        </tr>
        <tr>
            <td valign="top">
                <label>ZIP</label><br>
                <input type="text" name="zip" placeholder="ZIP">
            </td>
            <td rowspan="2" valign="top">
                <label>Address</label><br>
                <textarea name="address" rows="4" placeholder="Address"></textarea>
            </td>
        </tr>
        <tr>
            <td>&nbsp;</td> </tr>

        <tr>
            <td colspan="2">
                <div class="section-title">03. Contact Information</div>
            </td>
        </tr>
        <tr>
            <td>
                <label>Phone</label><br>
                <input type="tel" name="phone" placeholder="Phone">
            </td>
            <td>
                <label>Email</label><br>
                <input type="email" name="email" placeholder="Email">
            </td>
        </tr>

        <tr>
            <td colspan="2" style="text-align: center; padding-top: 25px;">
                <input type="submit" value="Register" class="btn-register">
            </td>
        </tr>
    </table>
</form>

</body>
</html>
